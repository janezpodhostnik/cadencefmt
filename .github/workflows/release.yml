name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-vsix:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version from tag
        id: version
        run: |
          version="${GITHUB_REF#refs/tags/v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Version: $version"

      - name: Verify tag matches editors/vscode/package.json
        working-directory: editors/vscode
        run: |
          pkg_version=$(node -p "require('./package.json').version")
          if [ "${{ steps.version.outputs.version }}" != "$pkg_version" ]; then
            echo "Tag version (${{ steps.version.outputs.version }}) does not match editors/vscode/package.json version ($pkg_version)" >&2
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: editors/vscode/package-lock.json

      - name: Install dependencies
        working-directory: editors/vscode
        run: npm ci

      - name: Typecheck
        working-directory: editors/vscode
        run: npm run typecheck

      - name: Build
        working-directory: editors/vscode
        run: npm run build

      - name: Package
        working-directory: editors/vscode
        run: npx vsce package --out cadencefmt.vsix

      - uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: editors/vscode/cadencefmt.vsix
          if-no-files-found: error

  build-binaries:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: linux, goarch: amd64 }
          - { goos: linux, goarch: arm64 }
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Resolve version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Build binaries
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          version="${{ steps.version.outputs.version }}"
          ldflags="-s -w -X main.version=$version"
          go build -trimpath -ldflags "$ldflags" -o dist/cadencefmt-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/cadencefmt
          go build -trimpath -ldflags "$ldflags" -o dist/cadencefmt-lsp-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/cadencefmt-lsp

      - uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error

  release:
    needs: [build-vsix, build-binaries]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Stage release assets
        run: |
          mkdir -p release
          mv artifacts/vsix/cadencefmt.vsix release/cadencefmt.vsix
          for d in artifacts/binaries-*; do
            mv "$d"/* release/
          done
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: release/*
          fail_on_unmatched_files: true

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build
        run: nix develop -c go build ./...

      - name: Nix package build
        run: nix build .#cadencefmt

      - name: Test
        run: nix develop -c go test -short ./... -v

      - name: Lint
        run: nix develop -c golangci-lint run ./...

      - name: Corpus tests
        continue-on-error: true
        run: nix develop -c go test ./internal/format/ -run TestCorpus -v

      - name: Fuzz
        run: |
          nix develop -c go test -fuzz FuzzFormat -fuzztime=60s ./internal/format/
          nix develop -c go test -fuzz FuzzRoundtrip -fuzztime=60s ./internal/format/

  vscode-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: editors/vscode/package-lock.json

      - name: Install dependencies
        working-directory: editors/vscode
        run: npm ci

      - name: Typecheck
        working-directory: editors/vscode
        run: npm run typecheck

      - name: Build
        working-directory: editors/vscode
        run: npm run build

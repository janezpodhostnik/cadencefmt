name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        go-version: ['1.22', '1.23']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./... -v

      - name: Fuzz (5 minutes)
        if: matrix.os == 'ubuntu-latest' && matrix.go-version == '1.23'
        run: |
          go test -fuzz FuzzFormat -fuzztime=60s ./internal/format/
          go test -fuzz FuzzRoundtrip -fuzztime=60s ./internal/format/

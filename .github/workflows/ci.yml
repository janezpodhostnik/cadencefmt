name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build
        run: nix develop -c go build ./...

      - name: Test
        run: nix develop -c go test -short ./... -v

      - name: Corpus tests
        continue-on-error: true
        run: nix develop -c go test ./internal/format/ -run TestCorpus -v

      - name: Fuzz
        run: |
          nix develop -c go test -fuzz FuzzFormat -fuzztime=60s ./internal/format/
          nix develop -c go test -fuzz FuzzRoundtrip -fuzztime=60s ./internal/format/

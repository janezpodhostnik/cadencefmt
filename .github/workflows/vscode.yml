name: VS Code Extension

on:
  push:
    tags:
      - "vscode/v*"
  pull_request:
    branches: [main]
    paths:
      - "editors/vscode/**"
      - ".github/workflows/vscode.yml"

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: editors/vscode/package-lock.json

      - name: Install dependencies
        working-directory: editors/vscode
        run: npm ci

      - name: Typecheck
        working-directory: editors/vscode
        run: npm run typecheck

      - name: Build
        working-directory: editors/vscode
        run: npm run build

      - name: Package
        working-directory: editors/vscode
        run: npx vsce package --out cadencefmt.vsix

      - name: Upload .vsix artifact
        uses: actions/upload-artifact@v4
        with:
          name: cadencefmt-vsix
          path: editors/vscode/cadencefmt.vsix
          if-no-files-found: error

  publish:
    if: startsWith(github.ref, 'refs/tags/vscode/v')
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: editors/vscode/package-lock.json

      - name: Verify tag matches package.json version
        working-directory: editors/vscode
        run: |
          tag="${GITHUB_REF#refs/tags/vscode/v}"
          pkg_version=$(node -p "require('./package.json').version")
          if [ "$tag" != "$pkg_version" ]; then
            echo "Tag version ($tag) does not match package.json version ($pkg_version)" >&2
            exit 1
          fi

      - name: Install dependencies
        working-directory: editors/vscode
        run: npm ci

      - name: Build
        working-directory: editors/vscode
        run: npm run build

      - name: Publish to VS Code Marketplace
        working-directory: editors/vscode
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx vsce publish
